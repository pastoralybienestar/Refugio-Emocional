            const handleAnswer = (effect) => {
                const newScores = { ...scores };
                for (let key in effect) { newScores[key] += effect[key]; }
                setScores(newScores);

                if (step < SIMULATOR_QUESTIONS.length - 1) {
                    setStep(step + 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    let maxEmotion = 'sadness';
                    let maxVal = newScores['sadness'];
                    for (let key in newScores) {
                        if (newScores[key] > maxVal) {
                            maxVal = newScores[key];
                            maxEmotion = key;
                        }
                    }
                    const fullEmotion = EMOTIONS.find(e => e.id === maxEmotion) || EMOTIONS[0];
                    setResult(fullEmotion);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            const reset = () => { setStep(0); setScores({ sadness: 0, anger: 0, anxiety: 0, stress: 0, fear: 0, disgust: 0 }); setResult(null); };

                                </div>
                                <div>
                                    <h3 className="font-black text-slate-800 text-lg mb-2 leading-tight group-hover:text-indigo-700 transition-colors">{c.title}</h3>
                                    <p className="text-sm text-slate-500 flex items-center gap-2 font-bold bg-slate-50 px-3 py-1 rounded-full w-max"><Icon name="eye" className="w-4 h-4"/> Leer chat</p>
                                </div>
                            </button>
                        ))}
                    </div>
                    <SupportSection />
                </div>
            );
        }

        function PsicoEduView() {
            return (
                <div className="animate-fade-in space-y-10">
                    <div className="text-center mb-10 card-3d p-8">
                        <h2 className="text-3xl font-black text-slate-800 flex items-center justify-center gap-3"><span className="text-4xl figure-3d">🧠</span> Psicoeducación</h2>
                        <p className="text-slate-600 text-lg mt-4 max-w-2xl mx-auto font-medium">Conceptos fundamentales de la psicología para entender cómo funcionas por dentro y desarrollar tu inteligencia emocional.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {PSICO_CONTENT.map((item, idx) => (
                            <div key={idx} className="card-3d p-8 relative overflow-hidden group hover:border-indigo-300 transition-all">
                                <div className={`absolute -right-8 -top-8 bg-${item.color}-100 w-40 h-40 rounded-full opacity-40 group-hover:scale-150 transition-transform duration-700`}></div>
                                <div className="relative z-10">
                                    <div className={`text-${item.color}-600 bg-${item.color}-50 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 border-2 border-${item.color}-200 shadow-sm`}>
                                        <Icon name={item.icon} className="w-8 h-8" />
                                    </div>
                                    <h3 className="text-2xl font-black text-slate-800 mb-3">{item.title}</h3>
                                    <p className="text-base text-slate-600 mb-6 leading-relaxed font-medium h-24">{item.desc}</p>
                                    <div className={`bg-${item.color}-50 border border-${item.color}-200 p-5 rounded-2xl shadow-inner`}>
                                        <h4 className={`text-xs font-black text-${item.color}-800 uppercase tracking-widest mb-2 flex items-center gap-2`}><Icon name="zap" className="w-4 h-4"/> Práctica</h4>
                                        <p className={`text-sm text-${item.color}-900 font-bold leading-relaxed`}>{item.tip}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                    <SupportSection />
                </div>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState('chequeador');

            return (
                <div className="min-h-screen relative flex flex-col bg-[#f1f5f9] font-sans pb-20">
                    {/* Header Institucional Superior Fijo */}
                    <div className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
                        <div className="flex justify-between items-center px-4 py-3 max-w-6xl mx-auto">
                            <div className="flex items-center gap-2">
                                <span className="text-xl figure-3d">✨</span>
                                <span className="font-black text-slate-800 hidden sm:block tracking-tight text-lg">Refugio Emocional</span>
                            </div>
                            <div className="flex justify-center md:justify-end">
                                <span className="text-[10px] md:text-xs font-black text-indigo-700 uppercase tracking-widest bg-indigo-50 px-4 py-2 rounded-full border border-indigo-200 shadow-inner">
                                    Pastoral y bienestar UCN
                                </span>
                            </div>
                        </div>
                        {/* Tabs Navbar */}
                        <div className="max-w-6xl mx-auto px-4 overflow-x-auto no-scrollbar border-t border-slate-100 bg-slate-50/50 backdrop-blur-md">
                            <div className="flex justify-start md:justify-center min-w-max p-2 gap-2">
                                {[
                                    { id: 'chequeador', name: 'Chequeador', icon: 'check-square', emoji: '🎛️' },
                                    { id: 'simulador', name: 'Simulador', icon: 'microscope', emoji: '🔬' },
                                    { id: 'casos', name: 'Casos Reales', icon: 'message-square', emoji: '💬' },
                                    { id: 'educacion', name: 'Psicoeducación', icon: 'book-open', emoji: '🧠' }
                                ].map(tab => (
                                    <button key={tab.id} onClick={() => {setActiveTab(tab.id); window.scrollTo(0,0);}}
                                        className={`flex items-center gap-2 px-5 py-3 rounded-full text-sm font-black transition-all whitespace-nowrap btn-3d-base
                                        ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-[0_4px_0_#4338ca]' : 'bg-white border-2 border-slate-200 text-slate-600 hover:bg-slate-100 shadow-[0_4px_0_#e2e8f0]'}`}>
                                        <span>{tab.emoji}</span> {tab.name}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 p-4 md:p-8 pt-8">
                        <div className="max-w-5xl mx-auto">
                            {/* Dynamic View Rendering */}
                            {activeTab === 'chequeador' && (
                                <div>
                                    <header className="mb-12 text-center animate-fade-in pt-4">
                                        <h1 className="text-4xl md:text-6xl font-black text-slate-900 mb-6 tracking-tight drop-shadow-sm">
                                            Refugio Emocional
                                        </h1>
                                        <div className="max-w-2xl mx-auto">
                                            <p className="text-slate-600 text-lg md:text-xl font-medium leading-relaxed">
                                                Tu espacio seguro para identificar, comprender y transformar tus emociones con <span className="text-indigo-600 font-bold border-b-2 border-indigo-200">consciencia y cuidado integral.</span>
                                            </p>
                                        </div>
                                    </header>
                                    <ChequeadorView />
                                </div>
                            )}
                            {activeTab === 'simulador' && <SimuladorView />}
                            {activeTab === 'casos' && <CasosView />}
                            {activeTab === 'educacion' && <PsicoEduView />}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
