        function SimuladorView() {
            const [step, setStep] = useState(0);
            const [scores, setScores] = useState({ sadness: 0, anger: 0, anxiety: 0, stress: 0, fear: 0, disgust: 0 });
            const [result, setResult] = useState(null);

            const handleAnswer = (effect) => {
                const newScores = { ...scores };
                for (let key in effect) { newScores[key] += effect[key]; }
                setScores(newScores);

                if (step < SIMULATOR_QUESTIONS.length - 1) {
                    setStep(step + 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    let maxEmotion = 'sadness';
                    let maxVal = newScores['sadness'];
                    for (let key in newScores) {
                        if (newScores[key] > maxVal) {
                            maxVal = newScores[key];
                            maxEmotion = key;
                        }
                    }
                    const fullEmotion = EMOTIONS.find(e => e.id === maxEmotion) || EMOTIONS[0];
                    setResult(fullEmotion);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            const reset = () => { setStep(0); setScores({ sadness: 0, anger: 0, anxiety: 0, stress: 0, fear: 0, disgust: 0 }); setResult(null); };

            if (result) {

                                    <button key={tab.id} onClick={() => {setActiveTab(tab.id); window.scrollTo(0,0);}}
                                        className={`flex items-center gap-2 px-5 py-3 rounded-full text-sm font-black transition-all whitespace-nowrap btn-3d-base
                                        ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-[0_4px_0_#4338ca]' : 'bg-white border-2 border-slate-200 text-slate-600 hover:bg-slate-100 shadow-[0_4px_0_#e2e8f0]'}`}>
                                        <span>{tab.emoji}</span> {tab.name}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 p-4 md:p-8 pt-8">
                        <div className="max-w-5xl mx-auto">
                            {/* Dynamic View Rendering */}
                            {activeTab === 'chequeador' && (
                                <div>
                                    <header className="mb-12 text-center animate-fade-in pt-4">
                                        <h1 className="text-4xl md:text-6xl font-black text-slate-900 mb-6 tracking-tight drop-shadow-sm">
                                            Refugio Emocional
                                        </h1>
                                        <div className="max-w-2xl mx-auto">
                                            <p className="text-slate-600 text-lg md:text-xl font-medium leading-relaxed">
                                                Tu espacio seguro para identificar, comprender y transformar tus emociones con <span className="text-indigo-600 font-bold border-b-2 border-indigo-200">consciencia y cuidado integral.</span>
                                            </p>
                                        </div>
                                    </header>
                                    <ChequeadorView />
                                </div>
                            )}
                            {activeTab === 'simulador' && <SimuladorView />}
                            {activeTab === 'casos' && <CasosView />}
                            {activeTab === 'educacion' && <PsicoEduView />}
                            {activeTab === 'inteligencia' && <InteligenciaEmocionalView />}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
